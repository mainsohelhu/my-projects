<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>E-Commerce Billing App</title>

<style>
*{
    box-sizing: border-box;
}
body{
    margin:0;
    font-family: Arial, sans-serif;
    background:#f5f5f5;
}

/* HEADER */
header{
    background:#111;
    color:#fff;
    padding:15px 30px;
    font-size:22px;
    font-weight:bold;
}

/* LAYOUT */
.container{
    display:grid;
    grid-template-columns: 3fr 1fr;
    gap:20px;
    padding:20px;
}

/* PRODUCT GRID */
.products{
    display:grid;
    grid-template-columns: repeat(auto-fill, minmax(220px,1fr));
    gap:20px;
}

.card{
    background:#fff;
    border-radius:8px;
    padding:15px;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
    text-align:center;
}

.card img{
    width:100%;
    height:140px;
    object-fit:contain;
}

.card h3{
    margin:10px 0 5px;
}

.price{
    color:green;
    font-weight:bold;
    margin-bottom:10px;
}

.counter{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:10px;
}

.counter button{
    padding:5px 12px;
    font-size:18px;
    cursor:pointer;
}

/* CART */
.cart{
    background:#fff;
    padding:15px;
    border-radius:8px;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.cart h2{
    margin-top:0;
}

.cart-item{
    display:flex;
    justify-content:space-between;
    margin:8px 0;
    font-size:14px;
}

.total{
    margin-top:15px;
    font-size:20px;
    font-weight:bold;
}
</style>
</head>

<body>

<header>🛒 My E-Commerce Store</header>

<div class="container">

    <div class="products" id="productList"></div>

    <div class="cart">
        <h2>🧾 Cart</h2>
        <div id="cartItems"></div>
        <div class="total" id="totalBill">Total: ₹0</div>
    </div>

</div>

<script>
const products = [
    {id:1, name:"Pen", price:10, qty:0, img:"https://via.placeholder.com/150"},
    {id:2, name:"Notebook", price:50, qty:0, img:"https://via.placeholder.com/150"},
    {id:3, name:"Pencil", price:5, qty:0, img:"https://via.placeholder.com/150"},
    {id:4, name:"Eraser", price:5, qty:0, img:"https://via.placeholder.com/150"},
    {id:5, name:"School Bag", price:500, qty:0, img:"https://via.placeholder.com/150"}
];

const productList = document.getElementById("productList");
const cartItems = document.getElementById("cartItems");
const totalBill = document.getElementById("totalBill");

function renderProducts(){
    productList.innerHTML="";
    products.forEach(p=>{
        productList.innerHTML+=`
            <div class="card">
                <img src="${p.img}">
                <h3>${p.name}</h3>
                <div class="price">₹${p.price}</div>
                <div class="counter">
                    <button onclick="decrease(${p.id})">➖</button>
                    <span id="qty-${p.id}">${p.qty}</span>
                    <button onclick="increase(${p.id})">➕</button>
                </div>
            </div>
        `;
    });
}

function increase(id){
    const p = products.find(x=>x.id===id);
    p.qty++;
    update(id);
}

function decrease(id){
    const p = products.find(x=>x.id===id);
    if(p.qty>0){
        p.qty--;
        update(id);
    }
}

function update(id){
    document.getElementById(`qty-${id}`).innerText =
        products.find(x=>x.id===id).qty;
    updateCart();
}

function updateCart(){
    cartItems.innerHTML="";
    let total=0;

    products.forEach(p=>{
        if(p.qty>0){
            cartItems.innerHTML+=`
                <div class="cart-item">
                    <span>${p.name} x ${p.qty}</span>
                    <span>₹${p.price * p.qty}</span>
                </div>
            `;
            total+=p.price*p.qty;
        }
    });

    totalBill.innerText="Total: ₹"+total;
}

renderProducts();
</script>

</body>
</html>
