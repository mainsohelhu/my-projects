<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <style>
        body{
            background-image: url(https://4kwallpapers.com/images/walls/thumbs_3t/12705.jpg);
            background-size: 100vw 100vh;
            background-repeat: no-repeat;
            margin: 0;
            padding: 0;
        }
        .navContainer{
            display: flex;
            justify-content: space-between;
            width: 80vw;
            height: 10vh;
            margin: 10vh auto;

        }
        .style{
            border: rgb(217, 78, 3) solid 1px;
            background-color: rgba(0, 0, 0, 0.456);
            color: white;

        }
        .logo{
            line-height: 0.3;
            width: 150px;
            text-align: center;
        }
        .nav{
            width: 70%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .nav ul{
            display: flex;
            list-style: none;
            gap: 20px;
            align-items: center;
            justify-content: center;
            width: 100%;
        }
        ul li{
            width: 100%;
        }
        h1{
            display: inline-block;
        }
        .fa-solid{
            display: inline;
        }

    </style>
</head>
<body>
    <div class="navContainer">
        <div class="logo style">
            <h1>MRC</h1> 
            <p>Contruction</p>
        </div>
        <div class="nav style">
            <ul>
                
                <li>Service</li>
                <i class="fa-solid fa-house"></i>
                <li>Project</li>
                <li>About Us</li>
                <li>Careers</li>
                <li>Contact</li>
                <li>Call Now!</li>
            </ul>
        </div>
    </div>
</body>
</html>
