<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Simple Chat App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="chat-box">
  <div class="header">🟢 User Online</div>

  <div class="messages" id="messages"></div>

  <div class="input-area">
    <input type="text" id="input" placeholder="Type a message..." onkeydown="handleEvent(event)"  />
    <button onclick="sendMessage()">Send</button>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
