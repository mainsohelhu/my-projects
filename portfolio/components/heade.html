<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hamburger Menu</title>

    <style>
        /* RESET */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
        }

        header {
            background: black;
            padding: 15px 30px;
            position: sticky;
            top: 0;
        }

        .nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        h1 {
            color: white;
        }

        /* MENU */
        ul {
            list-style: none;
            display: flex;
            gap: 20px;
        }

        ul li a {
            color: white;
            text-decoration: none;
            font-size: 18px;
        }

        /* HAMBURGER */
        .hamburger {
            display: none;
            font-size: 30px;
            color: white;
            cursor: pointer;
        }

        /* MOBILE */
        @media (max-width: 768px) {
            ul {
                position: absolute;
                top: 70px;
                left: 0;
                width: 100%;
                background: black;
                flex-direction: column;
                align-items: center;
                display: none;
                padding: 20px 0;
            }

            ul.active {
                display: flex;
            }

            .hamburger {
                display: block;
            }
        }
    </style>
</head>
<body>

<header>
    <div class="nav">
        <h1>SOHEL</h1>

        <div class="hamburger" id="hamburger">☰</div>

        <ul id="menu">
            <li><a href="#hero">Home</a></li>
            <li><a href="#about">About</a></li>
            <li><a href="#projects">Projects</a></li>
            <li><a href="#contact">Contact</a></li>
        </ul>
    </div>
</header>

<script>
    const hamburger = document.getElementById("hamburger");
    const menu = document.getElementById("menu");

    hamburger.addEventListener("click", () => {
        menu.classList.toggle("active");
    });
</script>

</body>
</html>
