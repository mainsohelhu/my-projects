<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Triangle Design</title>

<style>
/* Container */
div {
    position: relative;
    width: 500px;
    margin: 100px auto;
    /* border: 2px solid; */
}

/* Image */
img {
    width: 80%;
    position: relative;
    z-index: 2;
}

.tri{
    border: 10px solid greenyellow;
    width: 60%;
    height: 300px;
    position: absolute;
    top: 0;
    left: 120px;
    margin: 0;
}
</style>

</head>
<body>

<div>
    <img src="Untitled design2.png" alt="">
    <div class="tri"></div>
</div>

</body>
</html>
